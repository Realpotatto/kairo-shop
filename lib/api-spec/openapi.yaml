openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: IrForge - Telegram Bot Builder Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: bots
  - name: plugins
  - name: marketplace
  - name: themes
  - name: plans
  - name: admin
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/telegram:
    post:
      operationId: linkTelegram
      tags: [auth]
      summary: Link the current account to a Telegram identity via the Login Widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Missing required fields
        "401":
          description: Invalid Telegram hash, or not logged in
        "409":
          description: Telegram account already linked to a different user
        "503":
          description: Telegram login not configured (TELEGRAM_BOT_TOKEN missing)

  # Users
  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/password:
    patch:
      operationId: changePassword
      tags: [users]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChange"
      responses:
        "200":
          description: OK

  # Dashboard summary
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # Bots
  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bots for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a new bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/{botId}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
    patch:
      operationId: updateBot
      tags: [bots]
      summary: Update a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /bots/{botId}/status:
    patch:
      operationId: toggleBotStatus
      tags: [bots]
      summary: Toggle bot active/inactive
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotStatusUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/{botId}/stats:
    get:
      operationId: getBotStats
      tags: [bots]
      summary: Get bot statistics
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

  # Bot Commands
  /bots/{botId}/commands:
    get:
      operationId: listCommands
      tags: [bots]
      summary: List bot commands
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotCommand"
    post:
      operationId: createCommand
      tags: [bots]
      summary: Create a bot command
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotCommandInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotCommand"

  /bots/{botId}/commands/{commandId}:
    patch:
      operationId: updateCommand
      tags: [bots]
      summary: Update a bot command
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
        - name: commandId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotCommandUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotCommand"
    delete:
      operationId: deleteCommand
      tags: [bots]
      summary: Delete a bot command
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
        - name: commandId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # Bot Plugins
  /bots/{botId}/plugins:
    get:
      operationId: listBotPlugins
      tags: [bots]
      summary: List installed plugins for a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstalledPlugin"
    post:
      operationId: installPlugin
      tags: [bots]
      summary: Install a plugin on a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginInstallInput"
      responses:
        "201":
          description: Installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPlugin"

  /bots/{botId}/plugins/{pluginId}:
    delete:
      operationId: uninstallPlugin
      tags: [bots]
      summary: Uninstall a plugin from a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: string
        - name: pluginId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Uninstalled

  # Marketplace
  /marketplace/items:
    get:
      operationId: listMarketplaceItems
      tags: [marketplace]
      summary: List marketplace items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceItem"

  /marketplace/items/{itemId}:
    get:
      operationId: getMarketplaceItem
      tags: [marketplace]
      summary: Get a marketplace item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceItem"

  /marketplace/featured:
    get:
      operationId: getFeaturedItems
      tags: [marketplace]
      summary: Get featured/trending marketplace items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceItem"

  # Plans / Billing
  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List available subscription plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /plans/current:
    get:
      operationId: getCurrentPlan
      tags: [plans]
      summary: Get current user's plan
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPlan"

  /plans/subscribe:
    post:
      operationId: subscribeToPlan
      tags: [plans]
      summary: Subscribe to a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPlan"

  # Themes
  /themes:
    get:
      operationId: listThemes
      tags: [themes]
      summary: List available themes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Theme"
    post:
      operationId: createTheme
      tags: [themes]
      summary: Create a custom theme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"

  /themes/{themeId}:
    patch:
      operationId: updateTheme
      tags: [themes]
      summary: Update a theme
      parameters:
        - name: themeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
    delete:
      operationId: deleteTheme
      tags: [themes]
      summary: Delete a theme
      parameters:
        - name: themeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /themes/apply:
    post:
      operationId: applyTheme
      tags: [themes]
      summary: Apply a theme as the active theme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyThemeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"

  # Admin
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Admin - update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Admin - delete a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - get platform-wide stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/announcements:
    get:
      operationId: listAnnouncements
      tags: [admin]
      summary: List announcements
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [admin]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/announcements/{announcementId}:
    delete:
      operationId: deleteAnnouncement
      tags: [admin]
      summary: Delete an announcement
      parameters:
        - name: announcementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, plan, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
        botCount:
          type: integer
        telegramId:
          type: ["string", "null"]
        telegramUsername:
          type: ["string", "null"]
        telegramFirstName:
          type: ["string", "null"]
        telegramLastName:
          type: ["string", "null"]
        telegramPhotoUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    TelegramAuthInput:
      type: object
      description: >
        Raw payload returned by Telegram's official Login Widget
        (https://core.telegram.org/widgets/login). Verified server-side
        against TELEGRAM_BOT_TOKEN before being linked to the current user.
        Telegram never includes a phone number in this payload.
      required: [id, first_name, auth_date, hash]
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        photo_url:
          type: string
        auth_date:
          type: integer
        hash:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        avatar:
          type: string
        bio:
          type: string
        telegramUsername:
          type: string

    PasswordChange:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    # Dashboard
    DashboardStats:
      type: object
      required: [totalBots, activeBots, totalUsers, totalMessages, totalRevenue, botsChange, usersChange, messagesChange]
      properties:
        totalBots:
          type: integer
        activeBots:
          type: integer
        totalUsers:
          type: integer
        totalMessages:
          type: integer
        totalRevenue:
          type: number
        botsChange:
          type: number
        usersChange:
          type: number
        messagesChange:
          type: number

    ActivityItem:
      type: object
      required: [id, type, title, description, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [bot_created, bot_deployed, plugin_installed, user_joined, plan_upgraded, command_created]
        title:
          type: string
        description:
          type: string
        botName:
          type: ["string", "null"]
        createdAt:
          type: string

    # Bots
    Bot:
      type: object
      required: [id, name, status, token, userId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, error, deploying]
        token:
          type: string
        userId:
          type: string
        username:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        commandCount:
          type: integer
        pluginCount:
          type: integer
        userCount:
          type: integer
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    BotInput:
      type: object
      required: [name, token]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        token:
          type: string

    BotUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        token:
          type: string

    BotStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, inactive]

    BotStats:
      type: object
      required: [botId, messages, users, commands, plugins, uptime]
      properties:
        botId:
          type: string
        messages:
          type: integer
        users:
          type: integer
        commands:
          type: integer
        plugins:
          type: integer
        uptime:
          type: number
        messagesPerDay:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
              count:
                type: integer

    BotCommand:
      type: object
      required: [id, botId, name, description, permission, createdAt]
      properties:
        id:
          type: string
        botId:
          type: string
        name:
          type: string
        description:
          type: string
        permission:
          type: string
          enum: [all, admin, owner]
        arguments:
          type: array
          items:
            type: string
        workflow:
          type: ["string", "null"]
        enabled:
          type: boolean
        createdAt:
          type: string

    BotCommandInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        permission:
          type: string
          enum: [all, admin, owner]
        arguments:
          type: array
          items:
            type: string
        workflow:
          type: string

    BotCommandUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permission:
          type: string
          enum: [all, admin, owner]
        arguments:
          type: array
          items:
            type: string
        workflow:
          type: string
        enabled:
          type: boolean

    InstalledPlugin:
      type: object
      required: [id, botId, marketplaceItemId, name, version, enabled, installedAt]
      properties:
        id:
          type: string
        botId:
          type: string
        marketplaceItemId:
          type: string
        name:
          type: string
        version:
          type: string
        enabled:
          type: boolean
        installedAt:
          type: string

    PluginInstallInput:
      type: object
      required: [marketplaceItemId]
      properties:
        marketplaceItemId:
          type: string

    # Marketplace
    MarketplaceItem:
      type: object
      required: [id, name, description, category, price, author, version, rating, installCount, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [plugin, component, template, theme]
        price:
          type: number
        isFree:
          type: boolean
        author:
          type: string
        version:
          type: string
        rating:
          type: number
        installCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        icon:
          type: ["string", "null"]
        featured:
          type: boolean
        createdAt:
          type: string

    # Plans
    Plan:
      type: object
      required: [id, name, price, interval, features, maxBots, maxPlugins]
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        interval:
          type: string
          enum: [monthly, yearly]
        features:
          type: array
          items:
            type: string
        maxBots:
          type: integer
        maxPlugins:
          type: integer
        maxUsers:
          type: integer
        popular:
          type: boolean

    UserPlan:
      type: object
      required: [planId, planName, status, expiresAt]
      properties:
        planId:
          type: string
        planName:
          type: string
        status:
          type: string
