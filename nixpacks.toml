[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["npm install -g pnpm@9"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile=false"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/irforge run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps api-server/dist/index.mjs"
